---
layout: default
title: Home
---

<div class="home-content">
  <!-- Circular profile picture with description -->
  <div class="profile-section centered-text">
    <img src="{{ '/assets/images/profile.png' | relative_url }}" alt="Profile Picture" class="profile-picture">
    <p>Welcome to my website! I'm Aliff Zulhelmi, cyber security technology student.</p>
  </div>

  <h2 class="centered-text">Latest Blog Posts</h2>
  <ul class="blog-list centered-content">
    {% for post in site.posts limit:3 %}
      <li>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        <span class="post-date">{{ post.date | date: "%B %d, %Y" }}</span>
      </li>
    {% endfor %}
  </ul>

  <h2 class="centered-text">Projects</h2>
  <ul class="project-list centered-content">
    <li><a href="#">VulnGuard | Coming Soon</a></li>
  </ul>
</div>

<script>
  // Typewriter effect
  const typewriterText = "Explore my journey in cybersecurity, from hacking to secure coding. Check out my blog!";
  const typewriterElement = document.getElementById('typewriter');
  let index = 0;

  function typeWriter() {
    if (index < typewriterText.length) {
      typewriterElement.innerHTML += typewriterText.charAt(index);
      index++;
      setTimeout(typeWriter, 100);
    } else {
      setTimeout(() => {
        typewriterElement.innerHTML = "";
        index = 0;
        typeWriter();
      }, 5000); // 5 seconds delay before restarting
    }
  }

  // Glitch effect
  function createGlitchEffect() {
    const glitchText = document.getElementById('glitchText');
    const originalText = glitchText.innerText;
    
    setInterval(() => {
      const glitchChance = Math.random();
      if (glitchChance < 0.3) {
        const glitchedText = originalText
          .split('')
          .map(char => Math.random() < 0.5 ? String.fromCharCode(char.charCodeAt(0) + Math.floor(Math.random() * 10) - 5) : char)
          .join('');
        glitchText.innerText = glitchedText;
        
        setTimeout(() => {
          glitchText.innerText = originalText;
        }, 100);
      }
    }, 100);
  }

  window.onload = function() {
    typeWriter();
    createGlitchEffect();
  };
</script>
