---
layout: default
title: Home
---

<div class="home-content">
  <h1 class="centered-text glitch" id="glitchText">Welcome to My CyberSec World</h1>
  <p class="centered-text" id="typewriter"></p>

  <h2 class="centered-text">Latest Blog Posts</h2>
  <ul text-align: center class="blog-list centered-list">
    {% for post in site.posts limit:3 %}
      <li  display: inline-block>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        <span class="post-date">{{ post.date | date: "%B %d, %Y" }}</span>
      </li>
    {% endfor %}
  </ul>

  <h2 class="centered-text">Projects</h2>
  <ul class="project-list centered-list">
    <li><a href="#">VulnGuard | Coming Soon</a></li>
  </ul>
</div>

<script>
  // Typewriter effect
  const typewriterText = "Explore my journey in cybersecurity, from hacking to secure coding. Check out my blog!";
  let index = 0;

  function typeWriter() {
    const typewriterElement = document.getElementById('typewriter');
    if (index < typewriterText.length) {
      typewriterElement.innerHTML += typewriterText.charAt(index);
      index++;
      setTimeout(typeWriter, 100);
    } else {
      setTimeout(() => {
        typewriterElement.innerHTML = "";
        index = 0;
        typeWriter();
      }, 5000); // Restart typewriter effect
    }
  }

  // Glitch effect
  function createGlitchEffect() {
    const glitchText = document.getElementById('glitchText');
    const originalText = glitchText.innerText;

    setInterval(() => {
      if (Math.random() < 0.3) {
        glitchText.innerText = originalText.split('')
          .map(char => Math.random() < 0.5 ? String.fromCharCode(char.charCodeAt(0) + Math.floor(Math.random() * 10) - 5) : char)
          .join('');
        setTimeout(() => glitchText.innerText = originalText, 100);
      }
    }, 100);
  }

  window.onload = function() {
    typeWriter();
    createGlitchEffect();
  };
</script>
